server {
    resolver 8.8.8.8 114.114.114.114 valid=300s ipv6=off;
    server_name mathmate.top www.mathmate.top 47.94.83.150;
    root /var/www/mathmate;
    index index.html;

    location ~ ^/api/bilibili/img/([^/]+)/(.*)$ {
        proxy_pass https://$1/$2;
        proxy_ssl_server_name on;
        proxy_set_header Host $1;
        proxy_set_header Referer "https://www.bilibili.com/";
    }

    location /api/bilibili/ {
        proxy_pass https://api.bilibili.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.bilibili.com;
        proxy_set_header Referer "https://www.bilibili.com/";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|gif|ico|svg|woff2|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/mathmate.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mathmate.top/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.mathmate.top) {
        return 301 https://$host$request_uri;
    }

    if ($host = mathmate.top) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name mathmate.top www.mathmate.top 47.94.83.150;
    return 404;
}
